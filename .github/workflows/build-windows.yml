name: Build Windows

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  Build:
    needs: DetectChanges
    runs-on: windows-2022
    env:
      SR_TAG: 1.35.0.2011
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Doc-only PR — skipping heavy build steps
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "docs_only=true; build steps will skip and report success."

      - name: Download Simulated Reality SDK
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "LeiaSR-SDK-$env:SR_TAG-win64.zip" -D .
          tar -xf "LeiaSR-SDK-$env:SR_TAG-win64.zip" -C .
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "SimulatedRealityVulkanBeta.lib" -D "LeiaSR-SDK-$env:SR_TAG-win64/lib"
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "vkweaver.h" -D "LeiaSR-SDK-$env:SR_TAG-win64/include/sr/weaver"
          New-Item -ItemType Directory -Force "LeiaSR-SDK-$env:SR_TAG-win64/bin" | Out-Null
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "SimulatedRealityVulkanBeta.dll" -D "LeiaSR-SDK-$env:SR_TAG-win64/bin"

      # The plug-in CMake adds the runtime as a subdirectory, so we need
      # all the runtime's own build prereqs (vcpkg, Vulkan SDK, OpenXR
      # loader). Same shape as the runtime's build-windows.yml.
      - name: Setup vcpkg
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '5d90b0d5d0317336e65662f2bf0d671b0902c632'

      - name: Install Vulkan SDK
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      - if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenXR loader
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          $openxrVersion = "1.1.43"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      - name: Generate
        if: needs.DetectChanges.outputs.docs_only != 'true'
        env:
          LEIASR_SDKROOT: ${{ github.workspace }}/LeiaSR-SDK-${{ env.SR_TAG }}-win64
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/LeiaSR-SDK-$env:SR_TAG-win64" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DX_VCPKG_APPLOCAL_DEPS_INSTALL=ON `
            -DCMAKE_INSTALL_PREFIX=_package `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk" `
            -DBUILD_NUM="${{ github.run_number }}"

      - name: Build
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: cmake --build build --config Release --target install

      # Mirror of the runtime's ADR-019 assertion, applied to OUR plug-in
      # DLL. The plug-in is expected to have SimulatedReality imports —
      # that's the whole point — but its xrtPluginNegotiate export must
      # be the only one visible (ADR-019 §3.1).
      - name: Assert plug-in exports + symbols
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          $dll = "_package/bin/plugins/DisplayXR-LeiaSR.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "::error::$dll missing — plug-in build did not produce expected artifact."
            exit 1
          }
          $sr = & dumpbin /imports $dll 2>&1 | Select-String -Pattern "SimulatedReality"
          if (-not $sr) {
            Write-Host "::error::$dll does not import SimulatedReality* — link line regression. The plug-in must consume the SR SDK."
            exit 1
          }
          Write-Host "PASS: plug-in DLL imports SimulatedReality* (expected — ADR-019 §2.1)."
          $exports = & dumpbin /exports $dll 2>&1 | Select-String -Pattern "xrtPluginNegotiate"
          if (-not $exports) {
            Write-Host "::error::$dll missing xrtPluginNegotiate export."
            exit 1
          }
          Write-Host "PASS: plug-in DLL exports xrtPluginNegotiate."

      - name: Build Installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: cmake --build build --config Release --target installer

      - name: Upload artifacts
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DisplayXR-LeiaSR
          path: |
            _package/bin/plugins/DisplayXR-LeiaSR.dll
            _package/DisplayXRLeiaSRSetup-*.exe
          if-no-files-found: error
