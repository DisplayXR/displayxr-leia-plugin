name: Build Windows

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  DetectChanges:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          NON_DOC=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|LICENSE$|\.github/ISSUE_TEMPLATE/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOC" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  Build:
    needs: DetectChanges
    runs-on: windows-2022
    env:
      SR_TAG: 1.35.0.2011
      GH_TOKEN: ${{ github.token }}
      # ADR-020 rule 5: single source of truth for the runtime ref. The
      # Rule-5 self-check below asserts CMakeLists.txt's DXR_RUNTIME_GIT_TAG
      # equals this value so the FetchContent pin and the workflow checkout
      # can't drift apart (which is what spawned the v1.4.1↔v1.5.2 weave
      # regression originally).
      RUNTIME_REF: v1.9.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rule-5 ABI pin self-check (ADR-020)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        # Hard-fail the build if CMakeLists.txt's DXR_RUNTIME_GIT_TAG drifts
        # from the workflow's RUNTIME_REF. Turns the "KEEP IN SYNC" comment
        # below into an enforced check — bumping one without the other now
        # surfaces here, not in a silent ABI-skew bug on a user's box.
        shell: pwsh
        run: |
          $line = Select-String -Path 'CMakeLists.txt' -Pattern 'DXR_RUNTIME_GIT_TAG\s+"([^"]+)"' | Select-Object -First 1
          if (-not $line) {
            Write-Error "Rule-5 self-check: could not find DXR_RUNTIME_GIT_TAG in CMakeLists.txt"
            exit 1
          }
          $cmakeTag = $line.Matches[0].Groups[1].Value
          if ($cmakeTag -ne $env:RUNTIME_REF) {
            Write-Error "Rule-5 ABI pin drift (ADR-020): CMakeLists.txt has DXR_RUNTIME_GIT_TAG='$cmakeTag' but workflow RUNTIME_REF='$env:RUNTIME_REF'. Bump both together or the deployed runtime and plug-in ABIs will diverge."
            exit 1
          }
          Write-Host "Rule-5 ABI pin OK: DXR_RUNTIME_GIT_TAG == RUNTIME_REF == $env:RUNTIME_REF"

      - name: Checkout displayxr-runtime (pinned)
        if: needs.DetectChanges.outputs.docs_only != 'true'
        # The plug-in's CMakeLists.txt FetchContent pin tracks the runtime
        # release tag. Cloning here instead lets us point the build at it
        # as a local source dir (skips a redundant clone inside CMake) and
        # use its vcpkg.json for vcpkg manifest-mode (Eigen3, glslang, etc.).
        # KEEP IN SYNC with DXR_RUNTIME_GIT_TAG in CMakeLists.txt — enforced
        # by the Rule-5 self-check step above (ADR-020).
        uses: actions/checkout@v4
        with:
          repository: DisplayXR/displayxr-runtime
          ref: ${{ env.RUNTIME_REF }}
          path: displayxr-runtime
          fetch-depth: 1

      - name: Doc-only PR — skipping heavy build steps
        if: needs.DetectChanges.outputs.docs_only == 'true'
        run: echo "docs_only=true; build steps will skip and report success."

      - name: Download Simulated Reality SDK
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "LeiaSR-SDK-$env:SR_TAG-win64.zip" -D .
          tar -xf "LeiaSR-SDK-$env:SR_TAG-win64.zip" -C .
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "SimulatedRealityVulkanBeta.lib" -D "LeiaSR-SDK-$env:SR_TAG-win64/lib"
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "vkweaver.h" -D "LeiaSR-SDK-$env:SR_TAG-win64/include/sr/weaver"
          New-Item -ItemType Directory -Force "LeiaSR-SDK-$env:SR_TAG-win64/bin" | Out-Null
          gh release download sr-sdk-v$env:SR_TAG -R DisplayXR/displayxr-leia-plugin -p "SimulatedRealityVulkanBeta.dll" -D "LeiaSR-SDK-$env:SR_TAG-win64/bin"

      # The plug-in CMake adds the runtime as a subdirectory, so we need
      # all the runtime's own build prereqs (vcpkg, Vulkan SDK, OpenXR
      # loader). Same shape as the runtime's build-windows.yml.
      - name: Setup vcpkg
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '5d90b0d5d0317336e65662f2bf0d671b0902c632'
          # Point vcpkg manifest mode at the runtime's vcpkg.json so
          # Eigen3 + glslang + vulkan + cjson get installed.
          vcpkgJsonGlob: 'displayxr-runtime/vcpkg.json'

      - name: Install Vulkan SDK
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.283.0
          cache: true

      - if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenXR loader
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: |
          $openxrVersion = "1.1.43"
          $openxrUrl = "https://github.com/KhronosGroup/OpenXR-SDK-Source/releases/download/release-$openxrVersion/openxr_loader_windows-$openxrVersion.zip"
          Invoke-WebRequest -Uri $openxrUrl -OutFile openxr_loader.zip
          Expand-Archive -Path openxr_loader.zip -DestinationPath openxr_sdk -Force

      # Sync CMakeLists.txt VERSION to the most recent vX.Y.Z tag before
      # CMake reads it. The installer's OutFile is
      # `DisplayXRLeiaSRSetup-${VERSION}.${BUILD_NUM}.exe` and VERSION
      # flows from CMake `project(VERSION ...)` in the in-tree
      # CMakeLists.txt; without this, source-tree drift between releases
      # produces stale filenames in PR / main CI artifacts (cf.
      # displayxr-shell-pvt#33).
      #
      # `git describe --tags --abbrev=0 --match 'v[0-9]*'` resolves to
      # the exact tag on tag pushes and the most recent matching tag
      # otherwise. CI is authoritative; release flow can stop manually
      # bumping CMakeLists.txt.
      - name: Sync CMake VERSION from latest vX.Y.Z tag
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          # actions/checkout's default fetch-depth is 1 and skips tags;
          # pull just the tag refs (no deeper commit history) for describe.
          git fetch --depth=1 origin '+refs/tags/*:refs/tags/*' 2>$null

          $tag = (git describe --tags --abbrev=0 --match 'v[0-9]*' 2>$null)
          if (-not $tag) {
            Write-Host "No vX.Y.Z tag reachable — leaving CMakeLists.txt unchanged"
            exit 0
          }
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Host "Latest tag '$tag' is not vX.Y.Z — leaving CMakeLists.txt unchanged"
            exit 0
          }
          $ver = $Matches[1]
          Write-Host "Patching CMakeLists.txt VERSION to $ver (from tag $tag, ref=$env:GITHUB_REF)"
          $out = Get-Content CMakeLists.txt | ForEach-Object {
            if ($_ -match '^(\s*)VERSION\s+\d+\.\d+\.\d+(\s*)$') {
              "$($Matches[1])VERSION $ver$($Matches[2])"
            } else {
              $_
            }
          }
          Set-Content -Path CMakeLists.txt -Value $out -Encoding UTF8
          Select-String -Path CMakeLists.txt -Pattern '^\s*VERSION\s+\d+\.\d+\.\d+\s*$' | Select-Object -First 1

      - name: Generate
        if: needs.DetectChanges.outputs.docs_only != 'true'
        env:
          LEIASR_SDKROOT: ${{ github.workspace }}/LeiaSR-SDK-${{ env.SR_TAG }}-win64
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" `
            -DDXR_RUNTIME_SOURCE_DIR="${{ github.workspace }}/displayxr-runtime" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/LeiaSR-SDK-$env:SR_TAG-win64" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_DIR="${{ github.workspace }}/displayxr-runtime" `
            -DX_VCPKG_APPLOCAL_DEPS_INSTALL=ON `
            -DCMAKE_INSTALL_PREFIX=_package `
            -DOpenXR_ROOT="${{ github.workspace }}/openxr_sdk" `
            -DBUILD_NUM="${{ github.run_number }}"

      - name: Build
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: cmake --build build --config Release --target install

      # Mirror of the runtime's ADR-019 assertion, applied to OUR plug-in
      # DLL. The plug-in is expected to have SimulatedReality imports —
      # that's the whole point — but its xrtPluginNegotiate export must
      # be the only one visible (ADR-019 §3.1).
      - name: Assert plug-in exports + symbols
        if: needs.DetectChanges.outputs.docs_only != 'true'
        shell: pwsh
        run: |
          $dll = "_package/bin/plugins/DisplayXR-LeiaSR.dll"
          if (-not (Test-Path $dll)) {
            Write-Host "::error::$dll missing — plug-in build did not produce expected artifact."
            exit 1
          }
          $sr = & dumpbin /imports $dll 2>&1 | Select-String -Pattern "SimulatedReality"
          if (-not $sr) {
            Write-Host "::error::$dll does not import SimulatedReality* — link line regression. The plug-in must consume the SR SDK."
            exit 1
          }
          Write-Host "PASS: plug-in DLL imports SimulatedReality* (expected — ADR-019 §2.1)."
          $exports = & dumpbin /exports $dll 2>&1 | Select-String -Pattern "xrtPluginNegotiate"
          if (-not $exports) {
            Write-Host "::error::$dll missing xrtPluginNegotiate export."
            exit 1
          }
          Write-Host "PASS: plug-in DLL exports xrtPluginNegotiate."

      - name: Build Installer
        if: needs.DetectChanges.outputs.docs_only != 'true'
        run: cmake --build build --config Release --target installer

      - name: Upload artifacts
        if: needs.DetectChanges.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DisplayXR-LeiaSR
          path: |
            _package/bin/plugins/DisplayXR-LeiaSR.dll
            _package/DisplayXRLeiaSRSetup-*.exe
          if-no-files-found: error

      # Attach the Windows installer to the v* GitHub release on tag push —
      # mirrors the runtime's pattern (DisplayXR/displayxr-runtime#290). Before
      # this step, cutting a leia release required a manual `gh run download`
      # + `gh release create` dance after every tag (as we did for v1.0.6).
      # Now: tag → CI builds → installer attached automatically. The first
      # workflow to complete on the tag creates the release; subsequent ones
      # (none here, but the pattern matches the runtime) would append.
      # Only the installer .exe is attached; the raw DLL stays in the CI
      # artifact bundle for debugging access via `gh run download`.
      - name: Attach Windows installer to GitHub release on tag
        if: needs.DetectChanges.outputs.docs_only != 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: _package/DisplayXRLeiaSRSetup-*.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

  # On v* tag push, after Build succeeds, tell displayxr-runtime to
  # bump versions.json[leia_plugin] to this tag. The runtime side
  # runs an ABI assertion before committing (scripts/check_plugin_abi.py)
  # and, on mismatch, opens a tracking issue back on this repo asking
  # for a rebuild against the current runtime headers.
  #
  # Contract: "released = tested." A tagged release here means this
  # plug-in is intended to drop into the dev-orchestrator bundle.
  # See displayxr-runtime/docs/specs/runtime/versions-json-autobump.md.
  DispatchVersionsBump:
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.repository == 'DisplayXR/displayxr-leia-plugin' }}
    needs: [Build]
    runs-on: ubuntu-latest
    steps:
      - name: Mint dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DISPLAYXR_APP_ID }}
          private-key: ${{ secrets.DISPLAYXR_APP_PRIVATE_KEY }}
          owner: DisplayXR
          repositories: displayxr-runtime

      - name: Dispatch versions.json bump
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.dispatch-token.outputs.token }}
          repository: DisplayXR/displayxr-runtime
          event-type: versions-bump
          client-payload: |
            {
              "field":       "leia_plugin",
              "tag":         "${{ github.ref_name }}",
              "source_repo": "${{ github.repository }}"
            }
